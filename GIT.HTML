<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#ff4d94,#7b2ff7);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:700px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    color:#7b2ff7;
    margin-bottom:25px;
    font-size:30px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:bold;
    color:#444;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    border:2px solid #ddd;
    border-radius:8px;
    font-size:15px;
    outline:none;
    transition:0.3s;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#7b2ff7;
    box-shadow:0 0 10px rgba(123,47,247,0.3);
}

textarea{
    resize:vertical;
    min-height:100px;
}

input[type=file]{
    background:#f8f8f8;
    padding:8px;
}

.btn{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:30px;
}

button{
    padding:12px 35px;
    border:none;
    border-radius:8px;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.register{
    background:#28a745;
}

.register:hover{
    background:#218838;
    transform:translateY(-3px);
}

.reset{
    background:#dc3545;
}

.reset:hover{
    background:#c82333;
    transform:translateY(-3px);
}

::placeholder{
    color:#999;
}

@media(max-width:768px){

.container{
    padding:20px;
}

h2{
    font-size:24px;
}

.btn{
    flex-direction:column;
}

button{
    width:100%;
}
}
</style>

</head>
<body>

<div class="container">

<h2>Student Registration Form</h2>

<form>

<label for="fname">First Name</label>
<input type="text" id="fname" placeholder="Enter First Name" required>

<label for="lname">Last Name</label>
<input type="text" id="lname" placeholder="Enter Last Name" required>

<label for="gender">Gender</label>
<select id="gender" required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<label for="dob">Date of Birth</label>
<input type="date" id="dob" required>

<label for="phone">Phone Number</label>
<input type="tel" id="phone" placeholder="Enter Phone Number" required>

<label for="email">Email Address</label>
<input type="email" id="email" placeholder="Enter Email Address" required>

<label for="school">School Name</label>
<input type="text" id="school" placeholder="Enter School Name" required>

<label for="Department">Department</label>
<select id="Department" required>
<option value="">Select Department</option>
<option>nursery</option>
<option>primary</option>
<option>secondary</option>
<option>technical secondary school</option>
</select>

<label for="level">Level</label>
<select id="level">
<option>Select Level</option>
<option>L3</option>
<option>L4</option>
<option>L5</option>
</select>

<label for="title">Project Title</label>
<input type="text" id="title" placeholder="Enter Project Title">

<label for="category">Project Category</label>
<input type="text" id="category" placeholder="Enter Project Category">

<label for="description">Project Description</label>
<textarea id="description" placeholder="Describe your project"></textarea>

<label for="proposal">Upload Project Proposal (PDF)</label>
<input type="file" id="proposal" accept=".pdf">

<label for="studentid">Upload Student ID</label>
<input type="file" id="studentid">

<div class="btn">
<button type="submit" class="register">Register</button>
<button type="reset" class="reset">Reset</button>
</div>

</form>

</div>

</body>
</html>
